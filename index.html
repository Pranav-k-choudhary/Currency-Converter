<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <!--Font Awesome icons(for arrow icon)-->
    <link 
        rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" 
    />

    <style>
        /*Reset default spacing*/
        *{
            margin: 0;
            padding: 0;
        }

        /*Center container on screen*/
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: rgb(188, 229, 239);
        }

        /*containetr box*/
        .container{
            background-color: #fff;
            border-radius: 1rem;
            min-height: 50vh;
            width: 45vh;
            overflow: hidden;
        }

        /*Top skyblue header*/
        .header{
            background-color: #0096c7; 
            color: white;
            padding: 1rem;
            text-align: center;
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }
        /*Form spacing*/
        form{
            padding: 2rem;
            margin: 0 0 1rem 0;
        }

        /*Common style for input, select, button*/
        form select,
        button,
        input{
            width: 100%;
            border: none;
            outline: none;
            border-radius: 0.75rem;
        }

        /*Input field styling*/
        form input{
            border: 1px solid lightgray;
            font-size: 1rem;
            height: 3rem;
            padding-left: 0.5rem;
        }

        /*Dropdown section(from → to)*/
        .dropdown{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
        }
        /*arrow icon*/
        .dropdown i{
            font-size: 1.5rem;
            margin-top: 1rem;
        }

        /*Flag image size*/
        .select-container img{
            max-width: 2rem;
        }

        /*Select and flag container*/
        .select-container{
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0.5rem;
            border: 1px solid lightgray;
            width: 6rem;
        }

        /*Select dropdown*/
        .select-container select{
            font-size: 1rem;
            width: auto;
        }

        /*top and boton gap message*/
        .msg{
            margin: 2rem 0 2rem 0;
        }

        /*Button styling*/
        form button{
            height: 3rem;
            background-color: #af4d98;
            color: white;
            font-size: 1.15rem;
            cursor: pointer;
        }
        button:hover{
            background-color: #eba1d9;
        }

        /*Adjest shape for very small devices*/
        @media (max-width: 300px){
            .container{
                width: 90%;
            }
            .header h1{
                font-size: 1.2rem;
            }
            form{
                padding: 1.2rem;
            }
            form input{
                height: 2.4rem;
                font-size: 0.85rem;
            }
            .dropdown{
                flex-direction: column;
                gap: 0.8rem;
            }
            .dropdown i{
                transform: rotate(90deg); 
            }
            .select-container{
                width: 100%;
            }
            .select-container select{
                width: 100%;
            }
            form button{
                height: 2.5rem;
                font-size: 0.95rem;
            }
            .msg{
                text-align: center;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!--Main container-->
    <div class="container">
        <!--Header-->
        <div class="header">
            <h1>Currency Converter</h1>
        </div>
        <!--Form-->
        <form>
            <!--Amount input-->
            <div class="amount">
                <p>Enter Amount</p>
                <input value="1" type="text"/>
            </div>
            <!--Dropdown section-->
            <div class="dropdown">
                <!--From currency-->
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="">
                        <select name="from"></select> <!--JS se options aayenge-->
                    </div>
                </div>
                <!--icon-->
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <!--To currency-->
                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="">
                        <select name="to"></select> <!--JS se options aayenge-->
                    </div>
                </div>
            </div>
            <!--Result message-->
            <div class="msg">1USD = 80INR</div>
            <!--Button-->
            <button>Get Exchange Rate</button>
        </form>
    </div>
    <!--JS files-->
    <script src="code.js"></script>
    <script src="logic.js"></script>
</body>
</html>
